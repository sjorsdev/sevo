<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sevo-life</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #c8c8d0; font-family: 'Berkeley Mono', 'JetBrains Mono', 'Fira Code', monospace; overflow: hidden; }

  #app { display: grid; grid-template-columns: 1fr 280px; grid-template-rows: auto 1fr; height: 100vh; gap: 0; }

  header {
    grid-column: 1 / -1;
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: #111118;
    border-bottom: 1px solid #222;
  }
  header h1 { font-size: 16px; font-weight: 400; letter-spacing: 2px; color: #888; }
  header h1 span { color: #e8e8f0; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .controls button {
    background: #1a1a24; border: 1px solid #333; color: #aaa; padding: 5px 14px;
    font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 3px;
    transition: all 0.15s;
  }
  .controls button:hover { background: #252530; color: #ddd; border-color: #555; }
  .controls button.active { background: #2a2a3a; color: #fff; border-color: #667; }
  .controls select, .controls input {
    background: #1a1a24; border: 1px solid #333; color: #aaa; padding: 4px 8px;
    font-family: inherit; font-size: 12px; border-radius: 3px;
  }
  .controls label { font-size: 11px; color: #666; }

  #canvas-wrap {
    display: flex; align-items: center; justify-content: center;
    background: #08080c; position: relative;
  }
  canvas { image-rendering: pixelated; }

  #sidebar {
    background: #0e0e14; border-left: 1px solid #1a1a22;
    padding: 16px; overflow-y: auto; font-size: 12px;
  }

  .panel { margin-bottom: 16px; }
  .panel-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: #555; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #1a1a22;
  }

  .stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .stat-label { color: #666; }
  .stat-value { color: #b8b8c0; }
  .stat-value.good { color: #6c8; }
  .stat-value.warn { color: #ca6; }
  .stat-value.bad { color: #c66; }

  .bar { height: 4px; background: #1a1a24; border-radius: 2px; margin: 3px 0 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .entity-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .entity-chip {
    display: flex; align-items: center; gap: 4px; padding: 2px 8px;
    background: #151520; border-radius: 3px; font-size: 11px;
  }
  .entity-chip.dead { opacity: 0.3; text-decoration: line-through; }
  .entity-dot { width: 8px; height: 8px; border-radius: 50%; }

  .tick-display { font-size: 13px; color: #888; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>sevo / <span>life</span></h1>
    <div class="controls">
      <button id="btn-play" class="active">Play</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-step">Step</button>
      <button id="btn-reset">Reset</button>
      <label>Speed</label>
      <select id="speed">
        <option value="200">Slow</option>
        <option value="80" selected>Normal</option>
        <option value="30">Fast</option>
        <option value="8">Max</option>
      </select>
      <label>Seed</label>
      <input id="seed" type="number" value="42" style="width:60px">
      <span class="tick-display" id="tick-display">0 / 500</span>
    </div>
  </header>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="sidebar">
    <div class="panel">
      <div class="panel-title">Simulation</div>
      <div class="stat-row"><span class="stat-label">Tick</span><span class="stat-value" id="s-tick">0</span></div>
      <div class="stat-row"><span class="stat-label">Alive</span><span class="stat-value" id="s-alive">8</span></div>
      <div class="stat-row"><span class="stat-label">Avg Energy</span><span class="stat-value" id="s-energy">20.0</span></div>
      <div class="stat-row"><span class="stat-label">Avg Harvested</span><span class="stat-value" id="s-harvested">0.0</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">Fitness</div>
      <div class="stat-row"><span class="stat-label">Composite</span><span class="stat-value" id="s-fitness">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-fitness" style="width:0;background:#7a8"></div></div>
      <div class="stat-row"><span class="stat-label">Survival</span><span class="stat-value" id="s-survival">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-survival" style="width:0;background:#68a"></div></div>
      <div class="stat-row"><span class="stat-label">Efficiency</span><span class="stat-value" id="s-efficiency">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-efficiency" style="width:0;background:#a86"></div></div>
    </div>
    <div class="panel">
      <div class="panel-title">Beauty</div>
      <div class="stat-row"><span class="stat-label">Total</span><span class="stat-value" id="s-beauty">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-beauty" style="width:0;background:#a7a"></div></div>
      <div class="stat-row"><span class="stat-label">Symmetry</span><span class="stat-value" id="s-sym">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-sym" style="width:0;background:#777"></div></div>
      <div class="stat-row"><span class="stat-label">Complexity</span><span class="stat-value" id="s-complex">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-complex" style="width:0;background:#777"></div></div>
      <div class="stat-row"><span class="stat-label">Rhythm</span><span class="stat-value" id="s-rhythm">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-rhythm" style="width:0;background:#777"></div></div>
      <div class="stat-row"><span class="stat-label">Color Harmony</span><span class="stat-value" id="s-harmony">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-harmony" style="width:0;background:#777"></div></div>
      <div class="stat-row"><span class="stat-label">Coverage</span><span class="stat-value" id="s-coverage">—</span></div>
      <div class="bar"><div class="bar-fill" id="bar-coverage" style="width:0;background:#777"></div></div>
    </div>
    <div class="panel">
      <div class="panel-title">Entities</div>
      <div class="entity-list" id="entity-list"></div>
    </div>
  </div>
</div>

<script type="module">
import { World, DEFAULT_CONFIG, GENOMES, decide, scoreBeauty, resetRngs } from './sim.js';

const CELL = 14;
const COLORS = [
  [220, 60, 60],   // 0: red
  [220, 180, 40],  // 1: yellow
  [60, 190, 80],   // 2: green
  [60, 190, 210],  // 3: cyan
  [70, 100, 220],  // 4: blue
  [180, 80, 200],  // 5: magenta
];

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let world, config, running = true, interval = 80, animFrame;
let beautyCache = null, beautyTick = -1;

function init() {
  const seed = parseInt(document.getElementById('seed').value) || 42;
  config = { ...DEFAULT_CONFIG, seed, width: 60, height: 40, maxTicks: 500, initialResources: 150 };
  canvas.width = config.width * CELL;
  canvas.height = config.height * CELL;
  resetRngs();
  world = new World(config, GENOMES);
  beautyCache = null;
  beautyTick = -1;
  updateEntityList();
}

function render() {
  const { grid, entities } = world;
  const w = config.width, h = config.height;

  // Background
  ctx.fillStyle = '#08080c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines (very subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= w; x++) { ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, h * CELL); ctx.stroke(); }
  for (let y = 0; y <= h; y++) { ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(w * CELL, y * CELL); ctx.stroke(); }

  // Trails — smooth color gradient
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const cell = grid[y][x];

      if (cell.trail > 0.02) {
        const [r, g, b] = COLORS[cell.trailColor % 6];
        const alpha = cell.trail * 0.7;
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);

        // Glow for strong trails
        if (cell.trail > 0.5) {
          ctx.fillStyle = `rgba(${r},${g},${b},${(cell.trail - 0.5) * 0.3})`;
          ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
        }
      }

      // Resources — golden sparkle
      if (cell.resource > 0.1) {
        const alpha = 0.3 + cell.resource * 0.5;
        const size = 2 + cell.resource * 4;
        ctx.fillStyle = `rgba(255, 210, 60, ${alpha})`;
        ctx.beginPath();
        ctx.arc(x * CELL + CELL / 2, y * CELL + CELL / 2, size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Pulse events — expanding rings
  for (const evt of world.events) {
    if (evt.type === 'pulse') {
      const [r, g, b] = COLORS[entities[evt.id]?.genome.trailColor % 6] || [255, 255, 255];
      ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(evt.x * CELL + CELL / 2, evt.y * CELL + CELL / 2, evt.r * CELL, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (evt.type === 'death') {
      ctx.fillStyle = 'rgba(255, 80, 80, 0.4)';
      ctx.beginPath();
      ctx.arc(evt.x * CELL + CELL / 2, evt.y * CELL + CELL / 2, CELL, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Entities — circle with glow
  for (const e of entities) {
    if (!e.alive) continue;
    const [r, g, b] = COLORS[e.genome.trailColor % 6];
    const cx = e.pos.x * CELL + CELL / 2;
    const cy = e.pos.y * CELL + CELL / 2;
    const energyRatio = Math.min(1, e.energy / 20);

    // Outer glow
    const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, CELL * 0.8);
    grad.addColorStop(0, `rgba(${r},${g},${b},${0.3 * energyRatio})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(cx - CELL, cy - CELL, CELL * 2, CELL * 2);

    // Body
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.arc(cx, cy, 3 + energyRatio * 2, 0, Math.PI * 2);
    ctx.fill();

    // Eye direction (tiny white dot)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx + 1.5, cy - 1, 1, 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateStats() {
  const alive = world.entities.filter(e => e.alive);
  const aliveCount = alive.length;
  const avgEnergy = aliveCount > 0 ? alive.reduce((s, e) => s + e.energy, 0) / aliveCount : 0;
  const avgHarvested = world.entities.reduce((s, e) => s + e.totalHarvested, 0) / world.entities.length;

  document.getElementById('s-tick').textContent = world.tick;
  document.getElementById('tick-display').textContent = `${world.tick} / ${config.maxTicks}`;
  document.getElementById('s-alive').textContent = `${aliveCount} / ${world.entities.length}`;
  document.getElementById('s-alive').className = 'stat-value ' + (aliveCount >= 6 ? 'good' : aliveCount >= 3 ? 'warn' : 'bad');
  document.getElementById('s-energy').textContent = avgEnergy.toFixed(1);
  document.getElementById('s-harvested').textContent = avgHarvested.toFixed(1);

  // Compute beauty every 10 ticks (expensive)
  if (world.tick - beautyTick >= 10 || world.isFinished()) {
    beautyCache = scoreBeauty(world.grid);
    beautyTick = world.tick;
  }

  if (beautyCache) {
    const survivalRate = aliveCount / world.entities.length;
    const efficiency = Math.min(1, avgHarvested / (config.harvestGain * config.maxTicks));
    const fitness = 0.5 * survivalRate + 0.3 * beautyCache.total + 0.2 * efficiency;

    setBar('fitness', fitness);
    setBar('survival', survivalRate);
    setBar('efficiency', efficiency);
    setBar('beauty', beautyCache.total);
    setBar('sym', beautyCache.symmetry);
    setBar('complex', beautyCache.complexity);
    setBar('rhythm', beautyCache.rhythm);
    setBar('harmony', beautyCache.colorHarmony);
    setBar('coverage', beautyCache.coverage);
  }

  // Entity chips
  if (world.tick % 20 === 0 || world.isFinished()) updateEntityList();
}

function setBar(id, value) {
  document.getElementById('s-' + id).textContent = (value * 100).toFixed(1) + '%';
  document.getElementById('bar-' + id).style.width = (value * 100) + '%';
}

function updateEntityList() {
  const el = document.getElementById('entity-list');
  el.innerHTML = '';
  for (const e of world.entities) {
    const [r, g, b] = COLORS[e.genome.trailColor % 6];
    const chip = document.createElement('div');
    chip.className = 'entity-chip' + (e.alive ? '' : ' dead');
    chip.innerHTML = `<span class="entity-dot" style="background:rgb(${r},${g},${b})"></span>${GENOMES[e.id]?.name || e.id}`;
    chip.title = `Energy: ${e.energy.toFixed(1)} | Age: ${e.age} | Harvested: ${e.totalHarvested.toFixed(1)}`;
    el.appendChild(chip);
  }
}

// === Controls ===
let lastStepTime = 0;
function gameLoop(ts) {
  animFrame = requestAnimationFrame(gameLoop);
  if (!running || world.isFinished()) { render(); return; }
  if (ts - lastStepTime < interval) { return; }
  lastStepTime = ts;

  world.step((entity, neighbors) => decide(entity, neighbors, config.seed));
  render();
  updateStats();
}

document.getElementById('btn-play').addEventListener('click', () => { running = true; setActiveBtn('btn-play'); });
document.getElementById('btn-pause').addEventListener('click', () => { running = false; setActiveBtn('btn-pause'); });
document.getElementById('btn-step').addEventListener('click', () => {
  running = false; setActiveBtn('btn-pause');
  if (!world.isFinished()) {
    world.step((entity, neighbors) => decide(entity, neighbors, config.seed));
    render(); updateStats();
  }
});
document.getElementById('btn-reset').addEventListener('click', () => { init(); render(); updateStats(); });
document.getElementById('speed').addEventListener('change', (e) => { interval = parseInt(e.target.value); });
document.getElementById('seed').addEventListener('change', () => { init(); render(); updateStats(); });

function setActiveBtn(id) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

init();
render();
updateStats();
animFrame = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
